name: build

on:
  push:
    branches: [main, development, staging, "cursor/**"]
  pull_request:
    branches: [main, development, staging]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Go vet
        run: go vet ./...
      - name: Verify formatting
        run: make fmt-check
      - name: Build API binary
        run: |
          mkdir -p bin
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o bin/todo-api .
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: todo-api-linux-amd64
          path: bin/todo-api
