# Compose stack for local development (API + MySQL).

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: todo
      MYSQL_USER: todo
      MYSQL_PASSWORD: todo
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      CONFIG_DIR: /app
    volumes:
      - ./config.docker.toml:/app/config.toml:ro
      - ./testdata/dev_rsa_private.pem:/secrets/private.pem:ro
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy

  # Live-reload friendly API (Go toolchain in-container). Use:
  #   docker compose --profile dev up -d
  # API listens on host port 5001 to avoid clashing with the distroless `api` service.
  api-dev:
    profiles: ["dev"]
    image: golang:1.20-bookworm
    working_dir: /workspace
    volumes:
      - .:/workspace:cached
      - ./testdata/dev_rsa_private.pem:/secrets/private.pem:ro
    ports:
      - "5001:5000"
    environment:
      CGO_ENABLED: "0"
      TODO_LISTEN_ADDR: ":5000"
    command: >
      sh -c "cp config.docker.toml config.toml && go mod download && exec go run ."
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: {}
